<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> DIPAK — 3D Portfolio Room</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;700&display=swap');

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0910;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
    }

    #css-layer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 2;
    }

    .hint {
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      color: #cfc7de;
      font-size: 0.75rem;
      letter-spacing: 1px;
      opacity: 0.6;
      z-index: 10;
      pointer-events: none;
    }

    html.preloader-active {
      font-size: 0.77vw !important;
      /* Slightly larger to bring left and right blocks closer */
    }

    html.preloader-active.phone {
      font-size: 2.5vw !important;
      /* Bring blocks closer on phone */
    }

    html.preloader-active.tablet {
      font-size: 1.45vw !important;
      /* Bring blocks closer on tablet */
    }

    /* ---- Chris Kalafatis Style Preloader Styles ---- */
    .preloader {
      z-index: 100000;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      font-family: 'Space Grotesk', 'Montserrat', sans-serif;
      overflow: hidden;
    }

    .preloader span {
      opacity: 0;
      /* JS sets to 1 when fonts load */
      display: block;
    }

    .preloader p {
      position: fixed;
      right: 5rem;
      bottom: 5rem;
      font-size: 10rem;
      color: #000000;
      font-weight: 500;
      overflow: hidden;
      margin: 0;
      line-height: 1;
    }

    .preloader p span {
      display: inline-block;
    }

    .preloader .preloader_bg {
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .preloader_fl_c {
      height: 9rem;
      line-height: 8.5rem;
      display: flex;
      position: fixed;
      top: calc(50% - 4.5rem);
      left: 20.7rem;
      color: #000000;
      font-size: 12rem;
      letter-spacing: -0.5rem;
      font-weight: 500;
      overflow: hidden;
    }

    .preloader_ll_c {
      height: 9rem;
      line-height: 8.5rem;
      display: flex;
      position: fixed;
      top: calc(50% - 4.5rem);
      right: 17.7rem;
      color: #000000;
      font-size: 12rem;
      letter-spacing: -0.5rem;
      font-weight: 500;
      overflow: hidden;
    }

    .preloader_ll_c span {
      display: block;
      width: auto;
    }

    .yolo {
      display: inline-block;
      opacity: 0 !important;
    }

    .preloader--v2 {
      transform: translateY(100%);
    }

    /* Responsive Styling for Mobile */
    html.phone .preloader p {
      font-size: 4rem;
      right: 2rem;
      bottom: 2rem;
      display: none;
    }

    html.phone .preloader .preloader_fl_c,
    html.phone .preloader .preloader_ll_c {
      font-size: 4rem;
      letter-spacing: -0.25rem !important;
      line-height: 4rem;
      height: 4rem;
      top: calc(50% - 2rem);
    }

    html.phone .preloader .preloader_fl_c {
      left: 2.2rem;
      width: 12rem;
    }

    html.phone .preloader .preloader_ll_c {
      right: 1.5rem;
    }

    html.phone .preloader .preloader_l--a {
      display: inline-block;
      transform: translateX(-0.5rem);
    }

    html.phone .preloader .preloader_l--t {
      display: inline-block;
      transform: translateX(-1.15rem);
    }

    html.phone .preloader .preloader_l--i {
      display: inline-block;
      transform: translateX(-1.2rem);
    }

    html.phone .preloader .preloader_l--s {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.phone .preloader .preloader_l--p {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.phone .preloader .preloader_l--a1 {
      display: inline-block;
      transform: translateX(0.1rem);
    }

    /* Responsive Styling for Tablet */
    html.tablet .preloader p {
      font-size: 4rem;
      right: 2rem;
      bottom: 2rem;
      display: none;
    }

    html.tablet .preloader .preloader_fl_c,
    html.tablet .preloader .preloader_ll_c {
      font-size: 7.2rem;
      letter-spacing: -0.25rem !important;
      line-height: 5.8rem;
      height: 5.8rem;
      top: calc(50% - 2.9rem);
    }

    html.tablet .preloader .preloader_fl_c {
      left: 6.9rem;
      width: 24rem;
    }

    html.tablet .preloader .preloader_ll_c {
      right: 5.5rem;
    }

    html.tablet .preloader .preloader_l--a {
      display: inline-block;
      transform: translateX(-0.5rem);
    }

    html.tablet .preloader .preloader_l--t {
      display: inline-block;
      transform: translateX(-1.15rem);
    }

    html.tablet .preloader .preloader_l--i {
      display: inline-block;
      transform: translateX(-1.2rem);
    }

    html.tablet .preloader .preloader_l--s {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.tablet .preloader .preloader_l--p {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.tablet .preloader .preloader_l--a1 {
      display: inline-block;
      transform: translateX(0.1rem);
    }

    /* ---- CSS3D marquee strips ---- */
    .marquee-strip {
      width: 1300px;
      height: 60px;
      background: #0b0a0e;
      /* solid obsidian */
      color: #dfb86c;
      /* Warm gold text */
      font-family: 'Space Grotesk', 'Montserrat', 'Helvetica Neue', sans-serif;
      font-size: 24px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 8px;
      /* High spacing for luxury feel */
      display: flex;
      align-items: center;
      border-top: 1px solid rgba(223, 184, 108, 0.25);
      /* Thin gold borders */
      border-bottom: 1px solid rgba(223, 184, 108, 0.25);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .marquee-strip marquee {
      width: 100%;
    }

    /* ---- video poster ---- */
    .video-poster {
      width: 460px;
      height: 280px;
      pointer-events: auto;
      display: block;
      position: relative;
      border: 6px solid #0b0a0e;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
    }

    .video-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-poster .play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(10, 9, 16, 0.7);
      border: 2px solid #f5f3fa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-poster .play:after {
      content: '';
      border-style: solid;
      border-width: 14px 0 14px 22px;
      border-color: transparent transparent transparent #f5f3fa;
      margin-left: 5px;
    }

    .video-poster .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 12px;
      background: rgba(10, 9, 16, 0.75);
      color: #f5f3fa;
      font-size: 18px;
      letter-spacing: 1px;
    }

    /* ---- resume neon link ---- */
    .resume-link {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 240px;
      height: 240px;
    }

    .resume-link a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 140px;
      height: 190px;
      border-radius: 16px;
      background: rgba(20, 18, 25, 0.85);
      border: 3px solid #6820bf;
      color: #f5f3fa;
      text-decoration: none;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 0 15px rgba(114, 12, 191, 0.4);
    }

    .resume-link a:hover {
      box-shadow: 0 0 35px rgba(68, 6, 135, 0.8);
      transform: scale(1.05);
    }

    .resume-link a span {
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
      text-align: center;
      color: #f5f3fa;
      text-shadow: 0 0 5px rgba(110, 15, 205, 0.8);
    }

    .resume-link a svg {
      filter: drop-shadow(0 0 4px rgba(126, 10, 235, 0.8));
      transition: transform 0.2s ease;
    }

    .resume-link a:hover svg {
      transform: translateY(-2px);
    }

    /* ---- social icon column ---- */
    .social-col {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 120px;
      align-items: center;
    }

    .social-col a {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(20, 18, 25, 0.85);
      border: 3.5px solid #8b5cf6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f3fa;
      text-decoration: none;
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.45);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .social-col a svg {
      width: 32px;
      height: 32px;
      fill: none;
      filter: drop-shadow(0 0 4px rgba(139, 92, 246, 0.6));
    }

    .social-col a:hover {
      box-shadow: 0 0 35px rgba(139, 92, 246, 0.8);
      transform: scale(1.05);
    }

    .project-label-h3 {
      pointer-events: none;
      width: 300px;
      text-align: center;
      color: #f5f3fa;
      font-family: Arial, sans-serif;
      font-size: 26px;
      font-weight: bold;
      margin: 0;
      padding: 0;
      text-shadow: 0 0 8px rgba(139, 92, 246, 0.7);
    }

    /* Modal Button Hover & Animation Effects */
    #close-skill-btn:hover,
    #close-pdf-btn:hover,
    #close-image-btn:hover {
      background: #f5f3fa !important;
      color: #141219 !important;
      transform: rotate(90deg) scale(1.1);
    }
  </style>

  <script>
    // Device classification for typography preloader
    (function () {
      var width = window.innerWidth;
      var cl = document.documentElement.classList;
      cl.add('preloader-active');
      if (width < 768) {
        cl.add('phone');
      } else if (width < 1024) {
        cl.add('tablet');
      } else {
        cl.add('desktop');
      }
    })();
  </script>

  <script>
    window.addEventListener('error', function (e) {
      document.getElementById('loading').innerHTML =
        '<div id="js-uncaught-error" style="color:#ef4444; font-family:monospace; font-size:16px; text-align:left; max-width:600px; margin:20px auto; padding:20px; background:#18181b; border:2px solid #ef4444; border-radius:8px; z-index:999999; position:relative;">' +

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { Reflector } from 'three/addons/objects/Reflector.js';

    const container = document.getElementById('container');

    /* =========================================================
       >>> EDIT THESE TO CUSTOMIZE <<<
       ========================================================= */
    const BRAND_TEXT = 'YOUR BRAND';
    const NAME_TEXT = ' DIPAK';
    const ABOUT_PARAGRAPH = 'Im Dipak Parmar, a passionate Web Developer who enjoys building modern, responsive, and interactive websites.I specialize in HTML, CSS, SCSS, JavaScript, Bootstrap, WordPress, and Three.js.I focus on creating clean, user - friendly designs with smooth animations and high performance.My goal is to keep learning new technologies and deliver creative digital experiences that make a lasting impression';

    const VIDEO_URL = 'https://www.youtube.com/watch?v=REPLACE_ME';
    const VIDEO_THUMB = './img.jpg';

    const RESUME_URL = './resume.pdf'; // <-- Points to the resume.pdf in the model directory

    const SOCIAL_LINKS = {
      linkedin: 'https://www.linkedin.com/in/REPLACE_ME',
      instagram: 'https://www.instagram.com/REPLACE_ME',
      github: 'https://github.com/REPLACE_ME'
    };

    const PROJECT_PHOTOS = [
      './img.jpg',
      './image_copy_1.jpg',
      './image_copy_2.jpg',
      './img.jpg',
      './image_copy_1.jpg',
      './image_copy_2.jpg'
    ];

    const ABOUT_IMAGES = [
      './img.jpg',
      './image_copy_1.jpg',
      './image_copy_2.jpg'
    ];// <-- replace with real project screenshots
    const PROJECT_LABELS = ['PROJECT 1', 'PROJECT 2', 'PROJECT 3', 'PROJECT 4', 'PROJECT 5', 'PROJECT 6'];

    const SKILLS = ['SCSS', 'CSS', 'HMTL', 'BOOTSTRAP', 'JAVASCRIPT', 'WORDPRESS']; // <-- edit your real skills
    /* ========================================================= */

    // ---------- WebGL scene ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0910);
    scene.fog = new THREE.FogExp2(0x0a0910, 0.02);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    const initialAspect = window.innerWidth / window.innerHeight;
    if (initialAspect < 1.6) {
      camera.position.set(0, 2.5, 9.5); // Start further back on mobile/tablet so the room fits!
    } else {
      camera.position.set(0, 2.2, 6);
    }

    const isMobileDevice = window.innerWidth < 1024;
    const renderer = new THREE.WebGLRenderer({ antialias: !isMobileDevice, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.35; // brighter overall exposure
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.zIndex = '1';
    container.appendChild(renderer.domElement);

    // ---------- CSS3D scene ----------
    const cssScene = new THREE.Scene();
    const cssRenderer = new CSS3DRenderer();
    cssRenderer.setSize(window.innerWidth, window.innerHeight);
    cssRenderer.domElement.id = 'css-layer';
    container.appendChild(cssRenderer.domElement);

    // Global arrays & loader declarations
    const allFloaters = [];
    const interactiveObjects = [];
    // Create loading manager to track actual assets loading progress
    const loadingManager = new THREE.LoadingManager();
    const texLoader = new THREE.TextureLoader(loadingManager);
    texLoader.setCrossOrigin('anonymous');

    // ---------- Model Overlay scene (on top of CSS3D layer) ----------
    const modelScene = new THREE.Scene();
    let modelNamePlane = null;
    const modelCanvas = document.createElement('canvas');
    modelCanvas.id = 'model-overlay-layer';
    modelCanvas.style.position = 'absolute';
    modelCanvas.style.top = '0';
    modelCanvas.style.left = '0';
    modelCanvas.style.width = '100vw';
    modelCanvas.style.height = '100vh';
    modelCanvas.style.zIndex = '3';
    modelCanvas.style.pointerEvents = 'none';
    container.appendChild(modelCanvas);

    const modelRenderer = new THREE.WebGLRenderer({
      canvas: modelCanvas,
      alpha: true,
      antialias: !isMobileDevice,
      powerPreference: 'high-performance'
    });
    modelRenderer.setSize(window.innerWidth, window.innerHeight);
    modelRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    modelRenderer.toneMapping = THREE.ACESFilmicToneMapping;
    modelRenderer.toneMappingExposure = 1.35;
    modelRenderer.outputColorSpace = THREE.SRGBColorSpace;

    // Add separate lights to modelScene so the model has lighting in its overlay pass
    // Moody ambient light to let gaming neon colors pop on the model
    modelScene.add(new THREE.AmbientLight(0x120d1e, 1.4));
    modelScene.add(new THREE.HemisphereLight(0x2a1b40, 0x050408, 0.8));

    // Left side gaming red/cherry accent lighting
    const mLeftRedLight = new THREE.PointLight(0xff004c, 24.0, 24, 1.5);
    mLeftRedLight.position.set(-7.5, 4.5, 0);
    modelScene.add(mLeftRedLight);

    // Right side gaming blue/cyan accent lighting (adjusted to pure royal blue and boosted)
    const mRightBlueLight = new THREE.PointLight(0x0011ff, 35.0, 24, 1.5);
    mRightBlueLight.position.set(7.5, 4.5, 0);
    modelScene.add(mRightBlueLight);

    const mVioletLight = new THREE.PointLight(0x8b5cf6, 1.5, 20, 2);
    mVioletLight.position.set(4, 5, -2);
    modelScene.add(mVioletLight);

    const mWallLight = new THREE.PointLight(0xffffff, 5.0, 18, 2);
    mWallLight.position.set(7.5, 4, 0);
    modelScene.add(mWallLight);

    const mFrontLight = new THREE.PointLight(0xffffff, 12.0, 16, 1.5);
    mFrontLight.position.set(3.0, 2.5, 5.0);
    modelScene.add(mFrontLight);

    const mTopLight = new THREE.PointLight(0xffffff, 10.0, 12, 1.5);
    mTopLight.position.set(5.8, 6.0, 3.5);
    modelScene.add(mTopLight);

    // ---------- controls: ORBIT + ZOOM, orbiting room center ----------
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.target.set(0, 2, 0);
    controls.minDistance = 3;
    controls.maxDistance = 6.5;
    // Allow up-down rotation limits for vertical exploration
    controls.minPolarAngle = Math.PI / 2 - 0.35;
    controls.maxPolarAngle = Math.PI / 2 + 0.35;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;

    // Disable controls initially during load
    controls.enabled = false;

    // Aspect-ratio fov resizing adjustCamera function
    function adjustCamera() {
      const aspect = window.innerWidth / window.innerHeight;

      // Let's compute a responsive FOV that keeps the horizontal view width consistent.
      // For desktop (aspect >= 1.6), we use fov = 55.
      // For mobile/tablet (aspect < 1.6), we widen the fov so the whole room fits.
      if (aspect < 1.6) {
        // simple interpolation: as aspect goes from 1.6 down to 0.5, fov goes from 55 up to 92.
        // Formula: fov = 55 + (1.6 - aspect) * 35;
        const targetFov = 55 + (1.6 - aspect) * 35;
        camera.fov = Math.min(targetFov, 92); // cap at 92 to avoid fish-eye distortion
      } else {
        camera.fov = 55;
      }

      // Also adjust OrbitControls distance limit and disable autoRotate on mobile/tablet to avoid jitter/lag
      if (aspect < 1.6) {
        controls.maxDistance = 11.5;
        controls.autoRotate = false;
      } else {
        controls.maxDistance = 6.5;
        controls.autoRotate = true;
      }

      camera.aspect = aspect;
      camera.updateProjectionMatrix();
    }

    // Call adjustCamera initially
    adjustCamera();

    function addAboutImages() {

      const loader = new THREE.TextureLoader(loadingManager);

      const positions = [-2.7, 0, 2.7];

      ABOUT_IMAGES.forEach((img, i) => {

        const tex = loader.load(img);
        tex.colorSpace = THREE.SRGBColorSpace;

        const photo = new THREE.Mesh(

          new THREE.PlaneGeometry(2.4, 3.2), // Increased size (approx 33% larger)

          new THREE.MeshBasicMaterial({
            map: tex
          })

        );

        // Pushed slightly forward to sit beautifully on top of acoustic slats
        photo.position.set(
          positions[i],
          -1.4, // Adjusted Y height for larger geometry size
          -7.55
        );


        scene.add(photo);

      });

    }
    // ---------- lights (gaming room styling: left red, right blue) ----------
    // Moody ambient lighting for retro cyber feel
    scene.add(new THREE.AmbientLight(0x120d1e, 1.4));

    // ---------- procedural concrete texture ----------
    function makeConcreteTexture(tint) {
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const ctx = c.getContext('2d');
      ctx.fillStyle = tint;
      ctx.fillRect(0, 0, 512, 512);
      for (let i = 0; i < 9000; i++) {
        const x = Math.random() * 512, y = Math.random() * 512;
        const shade = Math.random() * 36 - 18;
        ctx.fillStyle = `rgba(${30 + shade},${28 + shade},${34 + shade},${Math.random() * 0.35})`;
        ctx.fillRect(x, y, Math.random() * 2 + 0.5, Math.random() * 2 + 0.5);
      }
      // visible panel seams (dark)
      for (let i = 0; i < 8; i++) {
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const y = (i + 0.5) * (512 / 8);
        ctx.moveTo(0, y);
        ctx.lineTo(512, y + (Math.random() * 16 - 8));
        ctx.stroke();
      }
      // subtle light highlight seams for a lit, polished look
      for (let i = 0; i < 8; i++) {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const y = (i + 0.5) * (512 / 8) + 2;
        ctx.moveTo(0, y);
        ctx.lineTo(512, y + (Math.random() * 16 - 8));
        ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    function createAcousticWall(width, height, color = 0x6b6255) {
      const group = new THREE.Group();

      const back = new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshStandardMaterial({
          color: 0x1d1d1d,
          roughness: 1
        })
      );
      group.add(back);

      const slatWidth = 0.18;
      const gap = 0.18;

      let count = 0;
      for (let x = -width / 2; x <= width / 2; x += slatWidth + gap) {
        count++;
      }

      const slatGeo = new THREE.BoxGeometry(slatWidth, height, 0.12);
      const slatMat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.8
      });

      const instancedMesh = new THREE.InstancedMesh(slatGeo, slatMat, count);
      let idx = 0;
      const dummy = new THREE.Object3D();

      for (let x = -width / 2; x <= width / 2; x += slatWidth + gap) {
        dummy.position.set(x, 0, 0.07);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(idx++, dummy.matrix);
      }

      group.add(instancedMesh);
      return group;
    }

    function makeTextTexture(text, { width = 1024, height = 256, font = 'bold 110px Arial', color = '#f5f3fa', glow = '#8b5cf6', align = 'center' } = {}) {
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, width, height);
      ctx.font = font;
      ctx.textAlign = align;
      ctx.textBaseline = 'middle';
      const x = align === 'center' ? width / 2 : 20;
      ctx.shadowColor = glow; ctx.shadowBlur = 28; ctx.fillStyle = color;
      ctx.fillText(text, x, height / 2);
      ctx.shadowBlur = 12;
      ctx.fillText(text, x, height / 2);
      return new THREE.CanvasTexture(c);
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '', curY = y;
      for (let n = 0; n < words.length; n++) {
        const test = line + words[n] + ' ';
        if (ctx.measureText(test).width > maxWidth && n > 0) {
          ctx.fillText(line, x, curY);
          line = words[n] + ' ';
          curY += lineHeight;
        } else { line = test; }
      }
      ctx.fillText(line, x, curY);
    }

    function makeParagraphTexture(text, { width = 1200, height = 560, font = '45px Arial', color = '#cfc7de', lineHeight = 62 } = {}) {
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      const ctx = c.getContext('2d');
      ctx.textBaseline = 'top'; ctx.textAlign = 'left';

      // Draw rich text with highlighting
      const highlights = ['dipak', 'parmar', 'web', 'developer', 'html', 'css', 'scss', 'javascript', 'bootstrap', 'wordpress', 'threejs'];
      const words = text.split(' ');
      let curX = 10;
      let curY = 10;

      words.forEach(word => {
        const cleanWord = word.toLowerCase().replace(/[^a-z0-9]/g, "");
        const isHighlight = highlights.includes(cleanWord);

        ctx.fillStyle = isHighlight ? '#2962ff' : color; // Blue highlight
        ctx.font = isHighlight ? 'bold 48px Arial' : font;

        const wordWidth = ctx.measureText(word).width;

        if (curX + wordWidth > width - 20) {
          curX = 10;
          curY += lineHeight;
          ctx.font = isHighlight ? 'bold 48px Arial' : font; // reset for correct measuring if wrapped
        }

        ctx.fillText(word, curX, curY);
        curX += wordWidth + 12; // add word width + space width
      });

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

        ctx.lineTo(10, 18);
        ctx.lineTo(22, -16);

    function drawRoundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();

      let lineNo = 1;
      let lastX = 84;
      for (const line of vsCodeLines) {
        ctx.fillStyle = '#5a5a5a';
        ctx.fillText(String(lineNo).padStart(2, ' '), 16, y);
        const take = Math.max(0, Math.min(line.text.length, remaining));
        ctx.fillStyle = line.color;
        const textSlice = line.text.slice(0, take);
        ctx.fillText(textSlice, 84, y);
        lastX = 84 + ctx.measureText(textSlice).width;
        remaining -= line.text.length;
        y += 42;
        lineNo++;
        if (remaining <= 0) break;
      }

      // blinking text cursor at the end of the typed text
      if (Math.floor(performance.now() / 500) % 2 === 0) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(lastX, y - 73, 14, 30);
      }

      vsCodeTexture.needsUpdate = true;

      vsCodeTypedChars += 0.55;
      if (vsCodeTypedChars > vsCodeTotalChars + 25) vsCodeTypedChars = 0;
    }

    function createKeyboardTexture() {
      const c = document.createElement('canvas');
      c.width = 512;
      c.height = 180;
      const ctx = c.getContext('2d');

      // Base dark keycap area
      ctx.fillStyle = '#18181c';
      ctx.fillRect(0, 0, 512, 180);

      // Draw columns of keys with split backlight (left blue, right red)
      const keyRows = 5;
      const colsPerRow = 15;
      const keyW = 28;
      const keyH = 26;
      const gap = 5;
      const startX = 12;
      const startY = 12;

      for (let r = 0; r < keyRows; r++) {
        for (let col = 0; col < colsPerRow; col++) {
          const isLeft = (col < 8);
          const glowColor = isLeft ? 'rgba(0, 188, 255, 0.9)' : 'rgba(255, 0, 76, 0.9)';

          const x = startX + col * (keyW + gap);
          const y = startY + r * (keyH + gap);

          // Draw key glow underlay
          ctx.fillStyle = glowColor;
          ctx.fillRect(x - 1, y - 1, keyW + 2, keyH + 2);

          // Draw keycap
          ctx.fillStyle = '#0a0a0d';
          ctx.fillRect(x, y, keyW, keyH);

          // Draw key legend dot
          ctx.fillStyle = '#71717a';
          ctx.font = '10px Arial';
          ctx.fillText("•", x + keyW / 2 - 2, y + keyH / 2 + 3);
        }
      }

      // Spacebar
      ctx.fillStyle = 'rgba(0, 188, 255, 0.9)';
      ctx.fillRect(150 - 1, 148 - 1, 212 + 2, 26 + 2);
      ctx.fillStyle = '#0a0a0d';
      ctx.fillRect(150, 148, 212, 26);

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

      rail.rotation.z = Math.PI / 2;

      function makeLeg(xOffset) {
        const legGroup = new THREE.Group();
        const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, height * 0.98, 8), steelMat);
        legL.position.set(-0.32, height * 0.49, 0);

        const base = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.03, 0.4), steelMat);
        base.position.set(0, 0.015, 0);

        // small caster wheels

          const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.03, 10), steelMat);

            shoe.position.set(cx, cy - cellH / 2 + 0.1, 0.04);

    function makeRugTexture(text) {
      const c = document.createElement('canvas');
      c.width = 640; c.height = 440;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, 640, 440);

      // rounded blob-ish rug shape
      ctx.fillStyle = '#141425';
      drawRoundRect(ctx, 20, 20, 600, 400, 60);
      ctx.fill();

      ctx.strokeStyle = 'rgba(0,60,255,0.5)';
      ctx.lineWidth = 6;
      ctx.stroke();

      ctx.fillStyle = '#eaf1ff';
      ctx.font = 'bold 78px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#0011ff';
      ctx.shadowBlur = 22;
      ctx.fillText(text, 320, 220);

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // Soft contact-shadow disc so the furniture reads as grounded / premium
    function makeSoftShadow(radius) {
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, 'rgba(0,0,0,0.55)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);
      const tex = new THREE.CanvasTexture(c);
      const mesh = new THREE.Mesh(
        new THREE.CircleGeometry(radius, 24),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false })
      );
      mesh.rotation.x = -Math.PI / 2;
      return mesh;
    }

      const repeatedText = `${text} · ${text} · ${text} · ${text} · ${text} · ${text} · ${text} · ${text}`;

    // 1. 3 Certificate frames above the table/desk

      './certificate1.jpg',
      './certificate2.jpg',
      './certificate3.jpg'
    ];
    const certPositions = [
      { z: -5.8, y: 6.2 },
      { z: -4.2, y: 6.2 },
      { z: -2.6, y: 6.2 }
    ];

    certificateImages.forEach((imgUrl, idx) => {
      const pos = certPositions[idx];
      // Thin black backplate frame - placed closer to the wall (x = 9.80)
      const frame = new THREE.Mesh(
        new THREE.PlaneGeometry(1.5, 1.05),
        new THREE.MeshStandardMaterial({ color: 0x050408, roughness: 0.6, metalness: 0.1 })
      );
      frame.rotation.y = -Math.PI / 2;
      frame.position.set(9.80, pos.y, pos.z);
      scene.add(frame);

      // Certificate content image - placed slightly in front of frame (x = 9.78) so it's fully visible
      const tex = texLoader.load(imgUrl);
      tex.colorSpace = THREE.SRGBColorSpace;
      const photo = new THREE.Mesh(
        new THREE.PlaneGeometry(1.4, 0.95),
        new THREE.MeshBasicMaterial({ map: tex })
      );
      photo.rotation.y = -Math.PI / 2;
      photo.position.set(9.78, pos.y, pos.z);
      scene.add(photo);

      // Interactive configuration for clicking to open modular popup
      photo.userData = {
        baseScale: 1.0,
        onClick: () => {
          openImageModal(imgUrl);
        }
      };
      interactiveObjects.push(photo);

      // Glowing luxury gold border trim (encircles the frames at x = 9.79)
      const glowingBorder = new THREE.Mesh(
        new THREE.BoxGeometry(0.015, 1.08, 1.53),
        new THREE.MeshBasicMaterial({ color: 0xdfb86c, toneMapped: false }) // Gold glow matching theme
      );
      glowingBorder.position.set(9.79, pos.y, pos.z);
      scene.add(glowingBorder);

      // Make them float subtly
      allFloaters.push({ group: [frame, photo, glowingBorder], baseY: pos.y, phase: Math.random() * Math.PI * 2 });
    });

    // (Social Icons Column moved to Wall 4 right side)

    // Load and render user's custom 3D model on the resume wall (center empty space)
    let loadedModel = null;
    const gltfLoader = new GLTFLoader(loadingManager);
    gltfLoader.load('mod/generated_model (6).glb', (gltf) => {
      const model = gltf.scene;

      // Auto scale model bounds to range beautifully in the room space
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const targetScale = 6.4 / maxDim; // Increased scale to 6.4 to make it larger

      // Scale with 8% horizontal width stretch (X and Z) and 15% vertical height stretch
      model.scale.set(targetScale * 1.08, targetScale * 1.15, targetScale * 1.08);

      // Center geometry around its local origin with scaling adjustments
      const center = box.getCenter(new THREE.Vector3());
      model.position.x = -center.x * (targetScale * 1.08);
      model.position.y = -center.y * (targetScale * 1.15);
      model.position.z = -center.z * (targetScale * 1.08);

      const modelGroup = new THREE.Group();
      modelGroup.add(model);

      // Position in front of resume wall (x=+10). Set at x=5.8 (closer to center of room), shifted to the right side (z=3.5)
      modelGroup.position.set(5.8, 1.2, 3.5);

      // Rotate it more to the right side (clockwise Y angle) as requested
      modelGroup.rotation.y = Math.PI * 1.0;

      modelScene.add(modelGroup);
      loadedModel = modelGroup;

      // (Note: Pushing to allFloaters loop is removed so the model remains completely static)
    }, undefined, (err) => {
      console.error('Error loading Glb:', err);
    });

    function openPdfModal(url) {
      const modal = document.getElementById('pdf-modal');
      const iframe = document.getElementById('pdf-iframe');
      iframe.src = url;
      modal.style.display = 'flex';
      controls.enabled = false; // Disable page drag when looking at PDF
    }
    function closePdfModal() {
      const modal = document.getElementById('pdf-modal'); // Fixed typo 'pd f-modal'
      const iframe = document.getElementById('pdf-iframe');
      modal.style.display = 'none';
      iframe.src = '';
      controls.enabled = true;
    }

    function openImageModal(url) {
      const modal = document.getElementById('image-modal');
      const img = document.getElementById('modal-img');
      img.src = url;
      modal.style.display = 'flex';
      controls.enabled = false; // Disable page drag when looking at image
    }
    function closeImageModal() {
      const modal = document.getElementById('image-modal');
      const img = document.getElementById('modal-img');
      modal.style.display = 'none';
      img.src = '';
      controls.enabled = true;
    }

    // Expose close triggers for PDF Viewer
    document.getElementById('close-pdf-btn').addEventListener('click', closePdfModal);
    document.getElementById('pdf-modal').addEventListener('click', (e) => {
      if (e.target.id === 'pdf-modal') {
        closePdfModal();
      }
    });

    // Expose close triggers for Image Viewer
    document.getElementById('close-image-btn').addEventListener('click', closeImageModal);
    document.getElementById('image-modal').addEventListener('click', (e) => {
      if (e.target.id === 'image-modal') {
        closeImageModal();
      }
    });

    // Raycast Interaction Setup for interactive WebGL objects
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('pointermove', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(interactiveObjects);

      if (intersects.length > 0) {
        document.body.style.cursor = 'pointer';
        const obj = intersects[0].object;
        interactiveObjects.forEach(io => {
          if (io === obj) {
            io.scale.set(io.userData.baseScale * 1.05, io.userData.baseScale * 1.05, io.userData.baseScale * 1.05);
            if (io.userData.hoverMap && io.material.map !== io.userData.hoverMap) {
              io.material.map = io.userData.hoverMap;
              io.material.needsUpdate = true;
            }
          } else {
            io.scale.set(io.userData.baseScale, io.userData.baseScale, io.userData.baseScale);
            if (io.userData.normalMap && io.material.map !== io.userData.normalMap) {
              io.material.map = io.userData.normalMap;
              io.material.needsUpdate = true;
            }
          }
        });
      } else {
        document.body.style.cursor = 'default';
        interactiveObjects.forEach(io => {
          io.scale.set(io.userData.baseScale, io.userData.baseScale, io.userData.baseScale);
          if (io.userData.normalMap && io.material.map !== io.userData.normalMap) {
            io.material.map = io.userData.normalMap;
            io.material.needsUpdate = true;
          }
        });
      }
    });

    window.addEventListener('click', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(interactiveObjects);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (obj.userData.onClick) {
          obj.userData.onClick();
        }
      }
    });

    // ---------- resize ----------
    window.addEventListener('resize', () => {
      adjustCamera();
      renderer.setSize(window.innerWidth, window.innerHeight);
      modelRenderer.setSize(window.innerWidth, window.innerHeight);
      cssRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------- render loop ----------
    const clock = new THREE.Clock();

    // GSAP Preloader Animation Sequence (Sped up)
    function runPreloaderTransition() {
      const width = window.innerWidth;
      let t = 11.5, e = 42.5, i = -43.5;
      if (width < 768) {
        t = 3.5; e = 13.5; i = -13;
      } else if (width < 1024) {
        t = 7; e = 27; i = -26;
      }

      gsap.to(".preloader--v1", { y: "-100%", stagger: 0.015, duration: 0.5, delay: 0.1, ease: "expo.out" });
      gsap.to(".preloader--v2", { y: "0%", stagger: 0.015, duration: 0.5, delay: 0.15, ease: "expo.out" });
      gsap.to("#preloader p span", { y: "-100%", delay: 0.2, duration: 0.5, ease: "expo.out" });

      gsap.to(".preloader_i--k", { x: t + "rem", delay: 0.6, duration: 0.35, ease: "expo.in" });
      gsap.to(".preloader_fl_c", { x: e + "rem", delay: 0.6, duration: 0.35, ease: "expo.in" });
      gsap.to(".preloader_i--p", { x: i + "rem", delay: 0.6, duration: 0.35, ease: "expo.in" });

      gsap.to(".preloader_i--k", { opacity: 0, delay: 0.95, duration: 0.05, ease: "expo.in" });
      gsap.to(".preloader_fl_c", { opacity: 0, delay: 0.95, duration: 0.05, ease: "expo.in" });
      gsap.to(".preloader_i--p", { opacity: 0, delay: 0.95, duration: 0.05, ease: "expo.in" });

      gsap.to(".preloader_ll_c", { scale: 1.4, delay: 0.85, duration: 0.3, ease: "expo.inOut" });
      gsap.to(".preloader_fl_c", { scale: 1.4, delay: 0.85, duration: 0.3, ease: "expo.inOut" });

      gsap.to(".preloader_bg", { opacity: 0, delay: 0.95, duration: 0.4, ease: "power2.out" });

      gsap.to(".preloader", {
        opacity: 0,
        delay: 1.3,
        duration: 0.3,
        onComplete: () => {
          const el = document.getElementById("preloader");
          if (el) el.parentElement.removeChild(el);

          // Re-enable controls zoom/pan after loader completes
          controls.enabled = true;

          // Remove root scaling
          document.documentElement.classList.remove('preloader-active');
        }
      });
    }

    // Set span layers visible once fonts are ready
    const preloaderSpans = document.querySelectorAll(".preloader span");
    if (document.fonts) {
      document.fonts.ready.then(() => {
        preloaderSpans.forEach(span => span.style.opacity = 1);
      });
    }
    // Fallback path in case font loading gets delayed or blocked
    setTimeout(() => {
      preloaderSpans.forEach(span => span.style.opacity = 1);
    }, 400);

    // Track assets progress
    let targetPercent = 0;
    let percentVal = 0;
    let loaderFinished = false;

    loadingManager.onProgress = function (url, itemsLoaded, itemsTotal) {
      targetPercent = Math.round((itemsLoaded / itemsTotal) * 100);
      if (targetPercent > 100) targetPercent = 100;
    };

    loadingManager.onLoad = function () {
      targetPercent = 100;
    };

    const preloaderTextEle = document.getElementById('preloader-text');

    function updateLoaderProgress() {
      if (percentVal < targetPercent) {
        percentVal += 3; // increment by 3 for 3x faster count-up speed
        if (percentVal > targetPercent) percentVal = targetPercent;
        let displayStr = percentVal < 10 ? `00${percentVal}%` : percentVal < 100 ? `0${percentVal}%` : `100%`;
        if (preloaderTextEle) {
          preloaderTextEle.innerText = displayStr;
        }
      }

      if (percentVal >= 100 && !loaderFinished) {
        loaderFinished = true;

        // Hide loader & run letters shift animation
        runPreloaderTransition();
        return;
      }

      requestAnimationFrame(updateLoaderProgress);
    }

    // Start progress ticking loop
    requestAnimationFrame(updateLoaderProgress);

    // Safety fallback: force progress completion after 2.5s (faster fallback)
    setTimeout(() => {
      targetPercent = 100;
    }, 2500);

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Automatically oscillate the scene and cssScene instead of camera target to avoid OrbitControls fighting/jitter
      const dy = Math.sin(t * 0.35) * 0.2;
      scene.position.y = dy;
      cssScene.position.y = dy;

      // Keep the 3D model static in front of the resume wall as before
      if (loadedModel) {
        // Configured in GLTFLoader block: position (5.8, 1.2, 3.5) and rotation (y = Math.PI)
      }



      controls.update();
      updateVSCodeScreen();
      updateTerminalScreen();
      updateWatchScreen();

      allFloaters.forEach(f => {
        const floatDy = Math.sin(t * 1.2 + f.phase) * 0.1;
        if (f.group) {
          f.group.forEach(m => { m.position.y = f.baseY + floatDy; });
        }
        if (f.cssObj) {
          f.cssObj.position.y = (f.baseY + 1.35) + floatDy; // Updated to match upper side position (+1.35)
        }
      });

      renderer.render(scene, camera);
      modelRenderer.render(modelScene, camera);
      cssRenderer.render(cssScene, camera);
    }
    animate();
  </script>

  <!-- PDF Viewer Overlay Modal -->
  <div id="pdf-modal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 4, 8, 0.85); backdrop-filter: blur(8px); z-index: 99999; justify-content: center; align-items: center;">
    <div
      style="position: relative; width: 90%; height: 90%; max-width: 960px; background: #141219; border: 3px solid #8b5cf6; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(139, 92, 246, 0.4);">
      <button id="close-pdf-btn"
        style="position: absolute; top: 18px; right: 18px; background: rgba(20, 18, 25, 0.9); border: 2px solid #8b5cf6; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #f5f3fa; font-size: 24px; font-weight: bold; transition: all 0.2s ease; z-index: 100000; box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); line-height: 1;">
        &times;
      </button>
      <iframe id="pdf-iframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
  </div>

  <!-- Certificate Image Viewer Overlay Modal with Blue Theme -->
  <div id="image-modal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 4, 8, 0.85); backdrop-filter: blur(8px); z-index: 99999; justify-content: center; align-items: center;">
    <div
      style="position: relative; width: 90%; height: 90%; max-width: 960px; background: #141219; border: 3px solid #0011ff; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0, 17, 255, 0.4); display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;">
      <button id="close-image-btn"
        style="position: absolute; top: 18px; right: 18px; background: rgba(20, 18, 25, 0.9); border: 2px solid #0011ff; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #f5f3fa; font-size: 24px; font-weight: bold; transition: all 0.2s ease; z-index: 100000; box-shadow: 0 0 10px rgba(0, 17, 255, 0.5); line-height: 1;">
        &times;
      </button>
      <img id="modal-img" src="" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px;">
    </div>
  </div>
</body>
