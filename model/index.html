<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> DIPAK — 3D Portfolio Room</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;700&display=swap');

    /* Cinematic Vignette Framing */
    .cinematic-vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.82);
      pointer-events: none;
      z-index: 9999;
    }

    /* Glassmorphism & Cyberpunk HUD Base styles */
    .project-glass-card,
    .skill-glass-card,
    .about-glass-panel,
    .holographic-hud {
      position: relative;
      background: rgba(10, 10, 14, 0.42);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 18px;
      font-family: 'Space Grotesk', 'Montserrat', sans-serif;
      box-sizing: border-box;
      padding: 24px;
      display: flex;
      flex-direction: column;
      color: #f5f3fa;
      pointer-events: auto !important;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, box-shadow;
    }

    /* Project Card Specific Styling */
    .project-thumbnail {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .project-title {
      font-size: 24px;
      margin: 0 0 8px 0;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .project-description {
      font-size: 14px;
      color: #8b949e;
      margin: 0 0 16px 0;
      line-height: 1.5;
    }

    .project-tech-tags {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .project-tech-tags span {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: bold;
    }

    .project-buttons {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .project-btn {
      flex: 1;
      height: 42px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
      color: #ffffff;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .live-btn {
      background: #00ffff;
      color: #0b0b0f;
    }

    .live-btn:hover {
      background: #33ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .git-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .git-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Skill Card Specific Styling */
    .skill-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }

    .skill-icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid;
    }

    .skill-meta {
      display: flex;
      flex-direction: column;
    }

    .skill-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #8b949e;
      font-weight: bold;
    }

    .skill-name {
      font-size: 20px;
      margin: 2px 0 0 0;
      font-weight: 700;
    }

    .skill-progress-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .skill-progress-ring {
      transform: rotate(-90deg);
    }

    .skill-value {
      position: absolute;
      font-size: 24px;
      font-weight: 700;
      font-family: inherit;
    }

    .skill-footer {
      margin-top: 22px;
      text-align: center;
    }

    .skill-experience {
      font-size: 11px;
      color: #8b949e;
      letter-spacing: 0.5px;
      font-weight: bold;
    }

    /* About Glass Panel Specific Styling */
    .about-glass-panel {
      flex-direction: row !important;
      padding: 0 !important;
    }

    .about-left-col {
      width: 46%;
      padding: 36px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    .about-avatar-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .about-avatar-icon {
      font-size: 32px;
    }

    .about-name {
      font-size: 32px;
      margin: 0 0 6px 0;
      font-weight: bold;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #ffffff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .about-title {
      font-size: 15px;
      color: #00ffff;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .about-desc {
      font-size: 14px;
      color: #8b949e;
      line-height: 1.5;
      margin: 20px 0 24px 0;
    }

    .about-social-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .about-social-btn {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f3fa;
      transition: all 0.2s ease;
    }

    .about-social-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .about-resume-btn {
      width: 100%;
      height: 48px;
      border-radius: 10px;
      border: none;
      background: #8b5cf6;
      color: #ffffff;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .about-resume-btn:hover {
      background: #a78bfa;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.45);
    }

    .about-right-col {
      width: 54%;
      padding: 36px;
      display: flex;
      flex-direction: column;
    }

    .about-timeline-section {
      width: 100%;
    }

    .timeline-title {
      font-size: 14px;
      letter-spacing: 2px;
      color: #8b949e;
      margin: 0 0 24px 0;
      font-weight: bold;
    }

    .timeline-item {
      position: relative;
      padding-left: 24px;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 24px;
    }

    .timeline-item:last-child {
      margin-bottom: 0;
    }

    .timeline-item::after {
      content: '';
      position: absolute;
      left: -5px;
      top: 4px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #00ffff;
      box-shadow: 0 0 8px #00ffff;
    }

    .timeline-label {
      font-size: 11px;
      color: #00ffff;
      font-weight: bold;
    }

    .timeline-item-title {
      font-size: 17px;
      font-weight: bold;
      margin: 4px 0 6px 0;
    }

    .timeline-desc {
      font-size: 13px;
      color: #8b949e;
      margin: 0;
      line-height: 1.45;
    }

    /* Holographic Navigation HUD Specific Styling */
    .holographic-hud {
      padding: 16px !important;
      border-radius: 14px !important;
      box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.05), 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 255, 255, 0.15) !important;
    }

    .hud-header {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #00ffff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      padding-bottom: 8px;
    }

    .hud-menu {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hud-item {
      background: transparent;
      border: none;
      color: #f5f3fa;
      padding: 10px 12px;
      text-align: left;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .hud-item:hover {
      background: rgba(0, 255, 255, 0.08);
      color: #00ffff;
      text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    }

    .hud-item.active {
      background: rgba(0, 255, 255, 0.15);
      color: #00ffff;
      text-shadow: 0 0 6px rgba(0, 255, 255, 0.6);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
    }

    .hud-item .badge {
      font-size: 9px;
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.2);
      padding: 2px 6px;
      border-radius: 4px;
      color: #00ffff;
    }

    /* Holographic Scanline Overlay Glows */
    .hud-scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 255, 0.08) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
      opacity: 0.35;
      border-radius: inherit;
    }


    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0910;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
    }

    #css-layer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 2;
    }

    .hint {
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      color: #cfc7de;
      font-size: 0.75rem;
      letter-spacing: 1px;
      opacity: 0.6;
      z-index: 10;
      pointer-events: none;
    }

    html.preloader-active {
      font-size: 0.77vw !important;
      /* Slightly larger to bring left and right blocks closer */
    }

    html.preloader-active.phone {
      font-size: 2.5vw !important;
      /* Bring blocks closer on phone */
    }

    html.preloader-active.tablet {
      font-size: 1.45vw !important;
      /* Bring blocks closer on tablet */
    }

    /* ---- Chris Kalafatis Style Preloader Styles ---- */
    .preloader {
      z-index: 100000;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      font-family: 'Space Grotesk', 'Montserrat', sans-serif;
      overflow: hidden;
    }

    .preloader span {
      opacity: 0;
      /* JS sets to 1 when fonts load */
      display: block;
    }

    .preloader p {
      position: fixed;
      right: 5rem;
      bottom: 5rem;
      font-size: 10rem;
      color: #ffffff;
      font-weight: 500;
      overflow: hidden;
      margin: 0;
      line-height: 1;
    }

    .preloader p span {
      display: inline-block;
    }

    .preloader .preloader_bg {
      width: 100%;
      height: 100%;
      background-color: #000000;
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .preloader_fl_c {
      height: 9rem;
      line-height: 8.5rem;
      display: flex;
      position: fixed;
      top: calc(50% - 4.5rem);
      left: 20.7rem;
      color: #ffffff;
      font-size: 12rem;
      letter-spacing: -0.5rem;
      font-weight: 500;
      overflow: hidden;
    }

    .preloader_ll_c {
      height: 9rem;
      line-height: 8.5rem;
      display: flex;
      position: fixed;
      top: calc(50% - 4.5rem);
      right: 17.7rem;
      color: #ffffff;
      font-size: 12rem;
      letter-spacing: -0.5rem;
      font-weight: 500;
      overflow: hidden;
    }

    .preloader_ll_c span {
      display: block;
      width: auto;
    }

    .yolo {
      display: inline-block;
      opacity: 0 !important;
    }

    .preloader--v2 {
      transform: translateY(100%);
    }

    /* Responsive Styling for Mobile */
    html.phone .preloader p {
      font-size: 4rem;
      right: 2rem;
      bottom: 2rem;
      display: none;
    }

    html.phone .preloader .preloader_fl_c,
    html.phone .preloader .preloader_ll_c {
      font-size: 4rem;
      letter-spacing: -0.25rem !important;
      line-height: 4rem;
      height: 4rem;
      top: calc(50% - 2rem);
    }

    html.phone .preloader .preloader_fl_c {
      left: 2.2rem;
      width: 12rem;
    }

    html.phone .preloader .preloader_ll_c {
      right: 1.5rem;
    }

    html.phone .preloader .preloader_l--a {
      display: inline-block;
      transform: translateX(-0.5rem);
    }

    html.phone .preloader .preloader_l--t {
      display: inline-block;
      transform: translateX(-1.15rem);
    }

    html.phone .preloader .preloader_l--i {
      display: inline-block;
      transform: translateX(-1.2rem);
    }

    html.phone .preloader .preloader_l--s {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.phone .preloader .preloader_l--p {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.phone .preloader .preloader_l--a1 {
      display: inline-block;
      transform: translateX(0.1rem);
    }

    /* Responsive Styling for Tablet */
    html.tablet .preloader p {
      font-size: 4rem;
      right: 2rem;
      bottom: 2rem;
      display: none;
    }

    html.tablet .preloader .preloader_fl_c,
    html.tablet .preloader .preloader_ll_c {
      font-size: 7.2rem;
      letter-spacing: -0.25rem !important;
      line-height: 5.8rem;
      height: 5.8rem;
      top: calc(50% - 2.9rem);
    }

    html.tablet .preloader .preloader_fl_c {
      left: 6.9rem;
      width: 24rem;
    }

    html.tablet .preloader .preloader_ll_c {
      right: 5.5rem;
    }

    html.tablet .preloader .preloader_l--a {
      display: inline-block;
      transform: translateX(-0.5rem);
    }

    html.tablet .preloader .preloader_l--t {
      display: inline-block;
      transform: translateX(-1.15rem);
    }

    html.tablet .preloader .preloader_l--i {
      display: inline-block;
      transform: translateX(-1.2rem);
    }

    html.tablet .preloader .preloader_l--s {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.tablet .preloader .preloader_l--p {
      display: inline-block;
      transform: translateX(-1.5rem);
    }

    html.tablet .preloader .preloader_l--a1 {
      display: inline-block;
      transform: translateX(0.1rem);
    }

    /* ---- CSS3D marquee strips ---- */
    .marquee-strip {
      width: 1300px;
      height: 60px;
      background: #0b0a0e;
      /* solid obsidian */
      color: #dfb86c;
      /* Warm gold text */
      font-family: 'Space Grotesk', 'Montserrat', 'Helvetica Neue', sans-serif;
      font-size: 24px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 8px;
      /* High spacing for luxury feel */
      display: flex;
      align-items: center;
      border-top: 1px solid rgba(223, 184, 108, 0.25);
      /* Thin gold borders */
      border-bottom: 1px solid rgba(223, 184, 108, 0.25);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .marquee-strip marquee {
      width: 100%;
    }

    /* ---- video poster ---- */
    .video-poster {
      width: 460px;
      height: 280px;
      pointer-events: auto;
      display: block;
      position: relative;
      border: 6px solid #0b0a0e;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.5);
    }

    .video-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-poster .play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(10, 9, 16, 0.7);
      border: 2px solid #f5f3fa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-poster .play:after {
      content: '';
      border-style: solid;
      border-width: 14px 0 14px 22px;
      border-color: transparent transparent transparent #f5f3fa;
      margin-left: 5px;
    }

    .video-poster .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 12px;
      background: rgba(10, 9, 16, 0.75);
      color: #f5f3fa;
      font-size: 18px;
      letter-spacing: 1px;
    }

    /* ---- resume neon link ---- */
    .resume-link {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 240px;
      height: 240px;
    }

    .resume-link a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 140px;
      height: 190px;
      border-radius: 16px;
      background: rgba(20, 18, 25, 0.85);
      border: 3px solid #6820bf;
      color: #f5f3fa;
      text-decoration: none;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 0 15px rgba(114, 12, 191, 0.4);
    }

    .resume-link a:hover {
      box-shadow: 0 0 35px rgba(68, 6, 135, 0.8);
      transform: scale(1.05);
    }

    .resume-link a span {
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 15px;
      letter-spacing: 1px;
      text-align: center;
      color: #f5f3fa;
      text-shadow: 0 0 5px rgba(110, 15, 205, 0.8);
    }

    .resume-link a svg {
      filter: drop-shadow(0 0 4px rgba(126, 10, 235, 0.8));
      transition: transform 0.2s ease;
    }

    .resume-link a:hover svg {
      transform: translateY(-2px);
    }

    /* ---- social icon column ---- */
    .social-col {
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 120px;
      align-items: center;
    }

    .social-col a {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(20, 18, 25, 0.85);
      border: 3.5px solid #8b5cf6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f3fa;
      text-decoration: none;
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.45);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .social-col a svg {
      width: 32px;
      height: 32px;
      fill: none;
      filter: drop-shadow(0 0 4px rgba(139, 92, 246, 0.6));
    }

    .social-col a:hover {
      box-shadow: 0 0 35px rgba(139, 92, 246, 0.8);
      transform: scale(1.05);
    }

    .project-label-h3 {
      pointer-events: none;
      width: 300px;
      text-align: center;
      color: #f5f3fa;
      font-family: Arial, sans-serif;
      font-size: 26px;
      font-weight: bold;
      margin: 0;
      padding: 0;
      text-shadow: 0 0 8px rgba(139, 92, 246, 0.7);
    }

    /* Modal Button Hover & Animation Effects */
    #close-skill-btn:hover,
    #close-pdf-btn:hover,
    #close-image-btn:hover {
      background: #f5f3fa !important;
      color: #141219 !important;
      transform: rotate(90deg) scale(1.1);
    }
  </style>
  <!-- Load GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // Device classification for typography preloader
    (function () {
      var width = window.innerWidth;
      var cl = document.documentElement.classList;
      cl.add('preloader-active');
      if (width < 768) {
        cl.add('phone');
      } else if (width < 1024) {
        cl.add('tablet');
      } else {
        cl.add('desktop');
      }
    })();
  </script>
</head>

<body>
  <div id="container">
    <!-- Chris Kalafatis Style preloader HTML -->
    <div id="preloader" class="preloader">
      <div class="preloader_bg"></div>

      <!-- First state (v1): visible initially -->
      <div class="preloader_fl_c">
        <span class="preloader--v1">D</span>
        <span class="preloader--v1">I</span>
        <span class="preloader--v1">P</span>
        <span class="preloader--v1">A</span>
        <span class="preloader--v1">K</span>
      </div>

      <div class="preloader_ll_c">
        <span class="preloader--v1">P</span>
        <span class="preloader--v1">A</span>

        ctx.lineWidth = 2;
        ctx.beginPath();
        const y = (i + 0.5) * (512 / 8);
        ctx.moveTo(0, y);
        ctx.lineTo(512, y + (Math.random() * 16 - 8));
        ctx.stroke();
      }
      // subtle light highlight seams for a lit, polished look
      for (let i = 0; i < 8; i++) {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const y = (i + 0.5) * (512 / 8) + 2;
        ctx.moveTo(0, y);
        ctx.lineTo(512, y + (Math.random() * 16 - 8));
        ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    function makeTextTexture(text, { width = 1024, height = 256, font = 'bold 110px Arial', color = '#f5f3fa', glow = '#8b5cf6', align = 'center' } = {}) {
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, width, height);
      ctx.font = font;
      ctx.textAlign = align;
      ctx.textBaseline = 'middle';
      const x = align === 'center' ? width / 2 : 20;
      ctx.shadowColor = glow; ctx.shadowBlur = 28; ctx.fillStyle = color;
      ctx.fillText(text, x, height / 2);
      ctx.shadowBlur = 12;
      ctx.fillText(text, x, height / 2);
      return new THREE.CanvasTexture(c);
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '', curY = y;
      for (let n = 0; n < words.length; n++) {
        const test = line + words[n] + ' ';
        if (ctx.measureText(test).width > maxWidth && n > 0) {
          ctx.fillText(line, x, curY);
          line = words[n] + ' ';
          curY += lineHeight;
        } else { line = test; }
      }
      ctx.fillText(line, x, curY);
    }

    function makeParagraphTexture(text, { width = 1200, height = 560, font = '45px Arial', color = '#cfc7de', lineHeight = 62 } = {}) {
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      const ctx = c.getContext('2d');
      ctx.textBaseline = 'top'; ctx.textAlign = 'left';

      // Draw rich text with highlighting
      const highlights = ['dipak', 'parmar', 'web', 'developer', 'html', 'css', 'scss', 'javascript', 'bootstrap', 'wordpress', 'threejs'];
      const words = text.split(' ');
      let curX = 10;
      let curY = 10;

      words.forEach(word => {
        const cleanWord = word.toLowerCase().replace(/[^a-z0-9]/g, "");
        const isHighlight = highlights.includes(cleanWord);

        ctx.fillStyle = isHighlight ? '#2962ff' : color; // Blue highlight
        ctx.font = isHighlight ? 'bold 48px Arial' : font;

        const wordWidth = ctx.measureText(word).width;

        if (curX + wordWidth > width - 20) {
          curX = 10;
          curY += lineHeight;
          ctx.font = isHighlight ? 'bold 48px Arial' : font; // reset for correct measuring if wrapped
        }

        ctx.fillText(word, curX, curY);
        curX += wordWidth + 12; // add word width + space width
      });

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function makeUniqueSkillTexture(name, percentage, color) {
      const c = document.createElement('canvas');
      c.width = 512;
      c.height = 660; // Taller canvas for vertical layout
      const ctx = c.getContext('2d');

      ctx.clearRect(0, 0, 512, 660);

      // Deep obsidian-glass frosted backdrop
      const grad = ctx.createLinearGradient(0, 0, 0, 660);
      grad.addColorStop(0, 'rgba(18, 17, 24, 0.96)');
      grad.addColorStop(0.5, 'rgba(12, 11, 16, 0.98)');
      grad.addColorStop(1, 'rgba(6, 5, 8, 1.0)');
      ctx.fillStyle = grad;

      // Rounded rectangle card body
      ctx.beginPath();
      drawRoundRect(ctx, 10, 10, 492, 640, 24);
      ctx.fill();

      // Ultra-thin luxury metallic border
      ctx.lineWidth = 4;
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Subtle internal separation line
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(50, 470);
      ctx.lineTo(462, 470);
      ctx.stroke();

      // Sleek, spaced skill name
      ctx.fillStyle = '#ffffff';
      ctx.font = '32px "Avenir Next", "Futura", "Space Grotesk", "Montserrat", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const spacedName = name.toUpperCase().split('').join(' ');
      ctx.fillText(spacedName, 256, 540);

      // Progress value subtext
      ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
      ctx.font = '16px "Avenir Next", "Futura", "Space Grotesk", sans-serif';
      ctx.fillText('PROFICIENCY', 256, 595);

      // Center of the circular progress dial
      const cx = 256;
      const cy = 240;
      const r = 120;

      // Background path
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
      ctx.lineWidth = 6;
      ctx.stroke();

      // Front active arc
      ctx.beginPath();
      const startAngle = -Math.PI / 2;
      const endAngle = startAngle + (Math.PI * 2 * (percentage / 100));
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.strokeStyle = color;
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Percentage label inside
      ctx.fillStyle = color;
      ctx.font = '100 72px "Baskerville", "Georgia", "Times New Roman", serif';
      ctx.fillText(percentage + '%', cx, cy);

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function drawIcon(ctx, name, color) {
      ctx.lineWidth = 6;

      const lowerName = name.toLowerCase();

        ctx.beginPath();

        ctx.lineTo(45, -50);

        ctx.lineTo(0, 60);
        ctx.lineTo(-35, 40);
        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, -35);
        ctx.lineTo(25, -35);
        ctx.lineTo(20, 15);
        ctx.lineTo(0, 30);
        ctx.lineTo(-20, 15);
        ctx.lineTo(-22, -10);
        ctx.lineTo(-5, -10);
        ctx.lineTo(-7, -20);
        ctx.lineTo(0, -20);
        ctx.closePath();
        ctx.fill();
      } else if (lowerName.includes('css')) {

        ctx.beginPath();

        ctx.lineTo(35, 40);
        ctx.lineTo(0, 60);
        ctx.lineTo(-35, 40);
        ctx.closePath();
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.beginPath();

        ctx.lineTo(25, -35);
        ctx.lineTo(20, 15);
        ctx.lineTo(0, 30);
        ctx.lineTo(-20, 15);
        ctx.lineTo(-22, -10);
        ctx.lineTo(0, -10);
        ctx.lineTo(0, -20);
        ctx.lineTo(-5, -20);

    function drawRoundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();

    function createKeyboardTexture() {
      const c = document.createElement('canvas');
      c.width = 512;
      c.height = 180;
      const ctx = c.getContext('2d');

      ctx.fillStyle = '#08080a';
      ctx.fillRect(0, 0, 512, 180);

      const keyRows = 5;
      const colsPerRow = 15;
      const keyW = 28;
      const keyH = 26;
      const gap = 5;
      const startX = 12;
      const startY = 12;

      for (let r = 0; r < keyRows; r++) {
        for (let col = 0; col < colsPerRow; col++) {
          const x = startX + col * (keyW + gap);
          const y = startY + r * (keyH + gap);
          const hue = (col / colsPerRow) * 360;

          // Keycaps glow border
          ctx.strokeStyle = `hsla(${hue}, 100%, 68%, 0.95)`;
          ctx.lineWidth = 2.0;
          ctx.strokeRect(x, y, keyW, keyH);

          // Deep dark key cap face
          ctx.fillStyle = '#0d0d12';
          ctx.fillRect(x + 2, y + 2, keyW - 4, keyH - 4);

          // Glowing key legends
          ctx.fillStyle = `hsla(${hue}, 90%, 80%, 0.85)`;
          ctx.font = 'bold 9px Arial';
          ctx.fillText("•", x + keyW / 2 - 2, y + keyH / 2 + 3);
        }
      }

      // Spacebar
      const spaceX = startX + 4 * (keyW + gap);
      const spaceWidth = keyW * 7 + gap * 6;
      const spaceY = startY + 4 * (keyH + gap);
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 2.0;
      ctx.strokeRect(spaceX, spaceY, spaceWidth, keyH);
      ctx.fillStyle = '#0d0d12';
      ctx.fillRect(spaceX + 2, spaceY + 2, spaceWidth - 4, keyH - 4);

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // Soft contact-shadow disc so the furniture reads as grounded / premium
    function makeSoftShadow(radius) {
      const c = document.createElement('canvas');
      c.width = c.height = 256;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, 'rgba(0,0,0,0.55)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);
      const tex = new THREE.CanvasTexture(c);
      const mesh = new THREE.Mesh(
        new THREE.CircleGeometry(radius, 24),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false })
      );
      mesh.rotation.x = -Math.PI / 2;
      return mesh;
    }

    let steamParticles = [];
    function createCoffeeMug() {
      const group = new THREE.Group();
      const mugMat = new THREE.MeshStandardMaterial({ color: 0x07070a, roughness: 0.12, metalness: 0.95 }); // premium black gloss metal
      const coffeeMat = new THREE.MeshStandardMaterial({ color: 0x3c2112, roughness: 0.8 }); // rich espresso color

      // Mug cylinder body
      const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.08, 16), mugMat);
      cup.position.y = 0.04;
      cup.castShadow = true;
      cup.receiveShadow = true;
      group.add(cup);

      // Mug interior coffee level
      const liquid = new THREE.Mesh(new THREE.CylinderGeometry(0.033, 0.033, 0.01, 16), coffeeMat);
      liquid.position.y = 0.076;
      group.add(liquid);

      // Handle ring segment
      const handleGeo = new THREE.TorusGeometry(0.02, 0.006, 8, 16, Math.PI);
      const handle = new THREE.Mesh(handleGeo, mugMat);
      handle.rotation.z = -Math.PI / 2;
      handle.position.set(0.035, 0.04, 0);
      group.add(handle);

      // Hot steam visual simulation particles
      const particleGeo = new THREE.SphereGeometry(0.0035, 5, 5);
      const steamMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.45, blendColor: 0xffffff });

      for (let i = 0; i < 9; i++) {
        const p = new THREE.Mesh(particleGeo, steamMat.clone());
        p.position.set(
          (Math.random() - 0.5) * 0.02,
          0.08 + Math.random() * 0.12,
          (Math.random() - 0.5) * 0.02
        );
        group.add(p);
        steamParticles.push({
          mesh: p,
          baseY: 0.08,
          speed: 0.012 + Math.random() * 0.018,
          wobbleSpeed: 2 + Math.random() * 4,
          phase: Math.random() * Math.PI * 2
        });
      }

      return group;
    }

    function updateCoffeeSteam(t) {
      steamParticles.forEach(p => {
        p.mesh.position.y += p.speed * 0.45;
        p.mesh.position.x += Math.sin(t * p.wobbleSpeed + p.phase) * 0.0006;

        // fade out as it climbs
        const dist = p.mesh.position.y - p.baseY;
        p.mesh.material.opacity = Math.max(0, 0.45 - dist * 3.5);
        p.mesh.scale.setScalar(1.0 + dist * 3.0); // slightly expand

        if (p.mesh.position.y > 0.22) {
          p.mesh.position.y = p.baseY;
          p.mesh.position.x = (Math.random() - 0.5) * 0.015;
          p.mesh.position.z = (Math.random() - 0.5) * 0.015;
          p.mesh.scale.setScalar(1.0);
          p.mesh.material.opacity = 0.45;
        }
      });
    }

            t.colorSpace = THREE.SRGBColorSpace;
            const imgAspect = t.image.width / t.image.height;
            const meshAspect = 2.1 / 2.1; // 1.0 (square mesh ratio)
            t.wrapS = THREE.ClampToEdgeWrapping;
            t.wrapT = THREE.ClampToEdgeWrapping;
            if (imgAspect > meshAspect) {
              t.repeat.set(meshAspect / imgAspect, 1);
              t.offset.set((1 - t.repeat.x) / 2, 0);
            } else {
              t.repeat.set(1, imgAspect / meshAspect);
              t.offset.set(0, (1 - t.repeat.y) / 2);
            }
            t.needsUpdate = true;

    function runPreloaderTransition() {
      const firstFl = document.querySelectorAll(".preloader_fl_c")[0];
      const firstLl = document.querySelectorAll(".preloader_ll_c")[0];

      // Hide the second state (v2) copy containers entirely as we are animating the first state letters directly
      const secondFl = document.querySelectorAll(".preloader_fl_c")[1];
      const secondLl = document.querySelectorAll(".preloader_ll_c")[1];
      if (secondFl) secondFl.style.display = "none";
      if (secondLl) secondLl.style.display = "none";

      const dSpan = firstFl.querySelector("span");
      const pSpan = firstLl.querySelector("span");

      const otherLetters = [
        ...firstFl.querySelectorAll("span:nth-child(n+2)"),
        ...firstLl.querySelectorAll("span:nth-child(n+2)")
      ];

      // Fade out percentage text and the other letters of DIPAK and PARMAR
      gsap.to("#preloader p span", { y: "-100%", delay: 0.1, duration: 0.5, ease: "expo.out" });
      gsap.to(otherLetters, { opacity: 0, duration: 0.4, ease: "power2.out" });

      // ---- Precise runtime center calculation (fixes off-center merge) ----
      const dRect = dSpan.getBoundingClientRect();
      const pRect = pSpan.getBoundingClientRect();
      const centerX = window.innerWidth / 2;

      const dTargetX = centerX - dRect.width; // D's right edge lands exactly at center
      const pTargetX = centerX;               // P's left edge lands exactly at center

      const deltaD = dTargetX - dRect.left;
      const deltaP = pTargetX - pRect.left;

      // Merge the actual D + P exactly at viewport center and keep parent line containers overflow visible during translate
      gsap.set([firstFl, firstLl], { overflow: "visible" });
      gsap.to(dSpan, { x: deltaD, delay: 0.4, duration: 0.5, ease: "power2.inOut" });
      gsap.to(pSpan, { x: deltaP, delay: 0.4, duration: 0.5, ease: "power2.inOut" });

      // Zoom-in portal transition: scale up massively (zoom in) to cover viewport (sequence: Image 4 -> Image 3 -> Image 1)
      gsap.set([dSpan, pSpan], { transformOrigin: "center center" });
      gsap.to([dSpan, pSpan], {
        scale: 90,
        opacity: 0,
        delay: 1.05,
        duration: 0.8,
        ease: "power2.in"
      });

      gsap.to(".preloader_bg", { opacity: 0, delay: 1.05, duration: 0.6, ease: "power2.out" });

      // Smooth camera intro swoop zoom-in transition (unchanged)
      const finalX = (window.innerWidth / window.innerHeight < 1.6) ? -5.6 : -3.5;
      const finalY = (window.innerWidth / window.innerHeight < 1.6) ? 2.3 : 2.2;
      const finalZ = (window.innerWidth / window.innerHeight < 1.6) ? 7.7 : 4.8;
      gsap.to(camera.position, {
        x: finalX,
        y: finalY,
        z: finalZ,
        duration: 2.2,
        delay: 0.8,
        ease: "power3.inOut",
        onUpdate: () => {
          controls.update();
        }
      });

      gsap.to(".preloader", {
        opacity: 0,
        delay: 1.35,
        duration: 0.4,
        onComplete: () => {
          const el = document.getElementById("preloader");
          if (el) el.parentElement.removeChild(el);

          controls.enabled = true;
          document.documentElement.classList.remove('preloader-active');

          gsap.timeline()
            .set("#nav-btn-left, #nav-btn-right", { display: "flex" })
            .to("#nav-btn-left, #nav-btn-right", { opacity: 1, duration: 0.6, ease: "power2.out" });
        }
      });
    }
    // Set span layers visible once fonts are ready
    const preloaderSpans = document.querySelectorAll(".preloader span");
    if (document.fonts) {
      document.fonts.ready.then(() => {
        preloaderSpans.forEach(span => span.style.opacity = 1);

    // Fallback path in case font loading gets delayed or blocked

    // Track assets progress
    let targetPercent = 0;
    let percentVal = 0;
    let loaderFinished = false;

    loadingManager.onProgress = function (url, itemsLoaded, itemsTotal) {
      targetPercent = Math.round((itemsLoaded / itemsTotal) * 100);

    loadingManager.onLoad = function () {

    const preloaderTextEle = document.getElementById('preloader-text');

    function updateLoaderProgress() {
      if (percentVal < targetPercent) {
        percentVal += 3; // increment by 3 for 3x faster count-up speed
        if (percentVal > targetPercent) percentVal = targetPercent;
        let displayStr = percentVal < 10 ? `00${percentVal}%` : percentVal < 100 ? `0${percentVal}%` : `100%`;
        if (preloaderTextEle) {
          preloaderTextEle.innerText = displayStr;
        }
      }

      if (percentVal >= 100 && !loaderFinished) {
        loaderFinished = true;

        // Hide loader & run letters shift animation
        runPreloaderTransition();
        return;
      }

      requestAnimationFrame(updateLoaderProgress);
    }

    // Start progress ticking loop
    requestAnimationFrame(updateLoaderProgress);

    // Safety fallback: force progress completion after 2.5s (faster fallback)
    setTimeout(() => {
      targetPercent = 100;
    }, 2500);

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Automatically oscillate the scene and cssScene instead of camera target to avoid OrbitControls fighting/jitter
      const dy = Math.sin(t * 0.35) * 0.2;
      scene.position.y = dy;
      cssScene.position.y = dy;

      }



      controls.update();

      updateWatchScreen();
      updateThreeJsPortfolioScreen(t);
      updateGithubDashboardScreen(t);
      updateLaptopScreen(t);
      updateCoffeeSteam(t);

      allFloaters.forEach(f => {
        const floatDy = Math.sin(t * 1.2 + f.phase) * 0.08;
        if (f.group) {
          f.group.forEach(m => { m.position.y = f.baseY + floatDy; });
        }
        if (f.cssObj) {
          if (f.customFloater) {
            f.cssObj.position.y = f.baseY + floatDy;
          } else {
            f.cssObj.position.y = (f.baseY + 1.35) + floatDy;

    // Setup camera navigation buttons (rotate clockwise / counter-clockwise around target)
    function rotateCamera(direction) {
      // direction: -1 for left, 1 for right
      const angle = direction * (Math.PI / 4.5); // 40 degrees rotation step

      const dx = camera.position.x - controls.target.x;
      const dz = camera.position.z - controls.target.z;

      const targetX = dx * Math.cos(angle) - dz * Math.sin(angle);
      const targetZ = dx * Math.sin(angle) + dz * Math.cos(angle);

      gsap.to(camera.position, {
        x: controls.target.x + targetX,
        z: controls.target.z + targetZ,
        duration: 1.0,
        ease: "power3.out",
        onUpdate: () => {
          controls.update();
        }
      });
    }

    const leftBtn = document.getElementById('nav-btn-left');
    const rightBtn = document.getElementById('nav-btn-right');

    leftBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      rotateCamera(-1);
    });
    rightBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      rotateCamera(1);
    });

    // Intercept and stop propagation of pointer movements and clicks to prevent background hover/raycasts
    const stopProp = (e) => e.stopPropagation();
    [leftBtn, rightBtn].forEach(btn => {
      btn.addEventListener('pointermove', stopProp);
      btn.addEventListener('pointerdown', stopProp);
      btn.addEventListener('pointerup', stopProp);
      btn.addEventListener('mousedown', stopProp);
      btn.addEventListener('mouseup', stopProp);
    });

    animate();
